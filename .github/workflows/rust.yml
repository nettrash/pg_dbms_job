name: Rust

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:  # Enable manual triggering

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Check format
      run: cargo fmt -- --check
    - name: Check clippy
      run: cargo clippy --all-targets --all-features
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    # Don't gate the merge on transitive advisories — visibility first.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit
        run: cargo audit

  load-test:
    name: Async load test
    needs: build
    runs-on: ubuntu-latest
    # Keep normal PR CI fast: only run on the default branch, on manual
    # dispatch, or on PRs explicitly labelled `load-test`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'load-test'))
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbms
          POSTGRES_PASSWORD: dbms
          POSTGRES_DB: dbms_job
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbms -d dbms_job"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: dbms
      PGPASSWORD: dbms
      PGDATABASE: dbms_job
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure psql is available
        run: psql --version || (sudo apt-get update && sudo apt-get install -y postgresql-client)

      - name: Build release binary
        working-directory: rust
        run: cargo build --release --bin pg_dbms_job

      - name: Run async load test
        run: bash ci/load_test.sh

  docker:
    needs: build
    runs-on: ubuntu-latest
    # Only run automatically on main branch, or when manually triggered
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: nettrash/pg_dbms_job
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build Docker image for testing (single platform)
      uses: docker/build-push-action@v5
      with:
        context: ./rust
        platforms: linux/amd64
        push: false
        tags: nettrash/pg_dbms_job:test
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    
    - name: Test Docker image locally
      run: |
        echo "Testing image: nettrash/pg_dbms_job:test"
        docker run --rm nettrash/pg_dbms_job:test --help
    
    - name: Build and push Docker image (multi-platform)
      # Push to registry if: not a PR AND (on main branch OR manually triggered)
      if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
      uses: docker/build-push-action@v5
      with:
        context: ./rust
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true
